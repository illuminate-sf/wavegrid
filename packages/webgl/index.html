<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7×7 Civic Center Laser Installation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #viewer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Control panel ── */
    #controls {
      position: fixed;
      top: 12px; right: 12px;
      width: 280px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      font-size: 13px;
    }
    #controls h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f44;
      display: inline-block;
    }

    .section {
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e8e8f0;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.active {
      background: rgba(74, 124, 255, 0.3);
      border-color: rgba(74, 124, 255, 0.5);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .slider-row label {
      width: 80px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #4a7cff;
      height: 4px;
    }
    .slider-row .val {
      width: 36px;
      text-align: right;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    #beam-info {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: monospace;
      color: #aaa;
      display: none;
      z-index: 10;
    }

    /* Scrollbar */
    #controls::-webkit-scrollbar { width: 4px; }
    #controls::-webkit-scrollbar-track { background: transparent; }
    #controls::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <div id="controls">
    <h1><span id="status-dot"></span> 7×7 Viewer</h1>

    <div class="section">
      <div class="section-title">Camera</div>
      <div id="presets" class="btn-row"></div>
    </div>

    <div class="section">
      <div class="section-title">Time of Day</div>
      <div class="btn-row">
        <button class="btn" data-tod="day">Day</button>
        <button class="btn" data-tod="dusk">Dusk</button>
        <button class="btn active" data-tod="night">Night</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Controls</div>
      <div class="slider-row">
        <label>Brightness</label>
        <input type="range" id="brightness" min="0" max="2" step="0.05" value="1.00" />
        <span class="val" id="brightness-val">1.00</span>
      </div>
      <div class="slider-row">
        <label>Haze</label>
        <input type="range" id="haze" min="0" max="1" step="0.05" value="0.40" />
        <span class="val" id="haze-val">0.40</span>
      </div>
      <div class="slider-row">
        <label>Beam Height</label>
        <input type="range" id="beam-height" min="100" max="3000" step="50" value="1500" />
        <span class="val" id="beam-height-val">1500</span>
      </div>
      <div class="slider-row">
        <label>Beam Width</label>
        <input type="range" id="beam-width" min="0.2" max="3" step="0.1" value="1.0" />
        <span class="val" id="beam-width-val">1.00</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Debug</div>
      <button class="btn" id="debug-btn">Toggle Debug Overlay</button>
    </div>
  </div>

  <div id="beam-info"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
