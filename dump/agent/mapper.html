<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zone ↔ Grid Mapping</title>
<style>
  :root{--bg:#0b0f14;--pan:#141b24;--ln:#28313d;--tx:#e6edf3;--mut:#8b98a5;--ac:#3b82f6;--fl:#f5c518;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:system-ui,Segoe UI,Arial;padding:14px}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:12px}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  button{background:#1f2937;color:var(--tx);border:1px solid var(--ln);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--ac)}
  button.pri{background:#1f6feb;border-color:#1f6feb}
  button.on{background:var(--ac);border-color:var(--ac)}
  .seg{display:flex;border:1px solid var(--ln);border-radius:8px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:#0f1620}
  .seg button.on{background:var(--ac)}
  #status{color:var(--mut);font-size:12px;margin-left:auto}
  .wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
  .card{background:var(--pan);border:1px solid var(--ln);border-radius:12px;padding:14px}
  .card h2{font-size:14px;margin:0 0 10px;color:#cdd9e5}
  /* grid */
  table.grid{border-collapse:separate;border-spacing:6px}
  td.cell{width:74px;height:60px;background:#0f1620;border:1px solid var(--ln);border-radius:8px;text-align:center;cursor:pointer;position:relative;vertical-align:middle;user-select:none}
  td.cell:hover{border-color:var(--ac)}
  td.cell .idx{font-size:22px;font-weight:600;line-height:1}
  td.cell .nm{font-size:11px;color:var(--mut);margin-top:3px}
  td.cell .pos{position:absolute;top:2px;left:4px;font-size:9px;color:#54616e}
  td.cell.flash{animation:fl .5s steps(1) infinite;border-color:var(--fl)}
  @keyframes fl{0%{background:#3a2f00}50%{background:#0f1620}}
  .corner{font-size:10px;color:#54616e;text-align:center}
  /* list */
  table.list{border-collapse:collapse;font-size:13px;min-width:300px}
  table.list th,table.list td{border-bottom:1px solid var(--ln);padding:6px 10px;text-align:left}
  table.list th{color:var(--mut);font-weight:500;font-size:11px;text-transform:uppercase}
  table.list tr.row{cursor:pointer}
  table.list tr.row:hover td{background:#0f1620}
  table.list tr.flash td{background:#3a2f00}
  .idxpill{display:inline-block;min-width:26px;text-align:center;background:#1f2937;border-radius:6px;padding:2px 6px;font-weight:600}
  /* modal */
  #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:50}
  #modal .box{background:var(--pan);border:1px solid var(--ln);border-radius:12px;padding:18px 20px;width:300px}
  #modal label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  #modal input,#modal select{width:100%;padding:8px;border-radius:8px;border:1px solid var(--ln);background:#0c1117;color:var(--tx);font-size:14px}
  #modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
</style></head>
<body>
<h1>Zone ↔ Grid Mapping</h1>
<div class="sub">Maps each bitmap position (cell) → BEYOND zone <b>index</b> + name. Read/written on the device via the proxy — not stored in this browser.</div>
<div class="bar">
  <button id="reload" onclick="load()">↻ Reload</button>
  <button id="save" class="pri" onclick="save()">⭳ Save to device</button>
  <span class="seg" title="Click action">
    <button id="m_flash" class="on" onclick="setMode('flash')">⚡ Flash</button>
    <button id="m_edit" onclick="setMode('edit')">✎ Edit</button>
  </span>
  <span id="dirty" style="color:var(--fl);font-size:12px;display:none">● unsaved</span>
  <span id="status">loading…</span>
</div>

<div class="wrap">
  <div class="card">
    <h2>Grid — bitmap position → index</h2>
    <table class="grid" id="grid"></table>
  </div>
  <div class="card">
    <h2>Index → Zone (A1)</h2>
    <table class="list"><thead><tr><th>Index</th><th>Zone</th><th>Cell</th><th>Tgt</th></tr></thead><tbody id="list"></tbody></table>
  </div>
</div>

<div id="modal"><div class="box">
  <div style="font-weight:600" id="m_title">Edit cell</div>
  <label>OSC zone index</label><input id="ed_index" type="number" min="0" max="255">
  <label>Zone name (A1)</label><input id="ed_name" type="text" maxlength="6">
  <label>Target</label><select id="ed_target"><option value="pc2">pc2 (master)</option><option value="pc1">pc1 (slave)</option></select>
  <div class="actions"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="applyModal()">OK</button></div>
</div></div>

<script>
var M=null, mode='flash', dirty=false, editPos=-1;
function st(s){document.getElementById('status').textContent=s;}
function setDirty(d){dirty=d;document.getElementById('dirty').style.display=d?'inline':'none';}
function setMode(m){mode=m;document.getElementById('m_flash').className=m==='flash'?'on':'';document.getElementById('m_edit').className=m==='edit'?'on':'';}

function load(){
  st('loading…');
  fetch('/api/mapping').then(r=>r.json()).then(m=>{M=m;render();setDirty(false);st('loaded '+M.cells.length+' cells');})
    .catch(e=>st('load failed: '+e));
}
function save(){
  if(!M)return;st('saving…');
  fetch('/api/mapping',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(M)})
    .then(r=>r.json()).then(j=>{if(j.ok){setDirty(false);st('saved to device ✓');}else st('save error: '+(j.error||'?'));})
    .catch(e=>st('save failed: '+e));
}
function cellByPos(pos){return M.cells.find(c=>c.pos===pos);}

function render(){renderGrid();renderList();}
function renderGrid(){
  var R=M.rows,C=M.cols,g=document.getElementById('grid');g.innerHTML='';
  // header row with column numbers
  var hr=document.createElement('tr');hr.appendChild(document.createElement('td'));
  for(var c=0;c<C;c++){var th=document.createElement('td');th.className='corner';th.textContent=c+1;hr.appendChild(th);}
  g.appendChild(hr);
  for(var r=0;r<R;r++){
    var tr=document.createElement('tr');
    var rl=document.createElement('td');rl.className='corner';rl.textContent=String.fromCharCode(65+r);tr.appendChild(rl);
    for(var c=0;c<C;c++){(function(pos){
      var cell=cellByPos(pos)||{index:'',name:'',pos:pos};
      var td=document.createElement('td');td.className='cell';td.setAttribute('data-index',cell.index);
      td.innerHTML='<div class="pos">'+pos+'</div><div class="idx">'+cell.index+'</div><div class="nm">'+(cell.name||'')+'</div>';
      td.onclick=function(){cellClick(pos);};
      tr.appendChild(td);
    })(r*C+c);}
    g.appendChild(tr);
  }
}
function renderList(){
  var tb=document.getElementById('list');tb.innerHTML='';
  var rows=M.cells.slice().sort(function(a,b){return a.index-b.index;});
  rows.forEach(function(cell){
    var tr=document.createElement('tr');tr.className='row';tr.setAttribute('data-index',cell.index);
    tr.innerHTML='<td><span class="idxpill">'+cell.index+'</span></td><td>'+(cell.name||'')+'</td>'+
      '<td>'+String.fromCharCode(65+cell.row)+(cell.col+1)+'</td><td>'+(cell.target||'pc2')+'</td>';
    tr.onclick=function(){cellClick(cell.pos);};
    tb.appendChild(tr);
  });
}
function cellClick(pos){ if(mode==='flash') flash(pos); else openModal(pos); }

function flash(pos){
  var cell=cellByPos(pos);if(!cell)return;
  st('flashing index '+cell.index+' ('+cell.name+')…');
  fetch('/api/command',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({action:'flashZone',index:cell.index,pos:cell.pos,name:cell.name,target:cell.target||'pc2',ms:5000})})
    .then(r=>r.json()).then(j=>{
      var until=(j&&j.until)||Date.now()+5000;var dur=Math.max(0,until-Date.now());
      highlight(cell.index,true);
      setTimeout(function(){highlight(cell.index,false);st('restored index '+cell.index);},dur);
    }).catch(e=>st('flash failed: '+e));
}
function highlight(index,on){
  document.querySelectorAll('[data-index="'+index+'"]').forEach(function(el){
    if(el.classList.contains('cell'))el.classList.toggle('flash',on);
    else el.classList.toggle('flash',on);
  });
}

function openModal(pos){
  editPos=pos;var cell=cellByPos(pos);
  document.getElementById('m_title').textContent='Edit cell '+pos+'  ('+String.fromCharCode(65+cell.row)+(cell.col+1)+')';
  document.getElementById('ed_index').value=cell.index;
  document.getElementById('ed_name').value=cell.name||'';
  document.getElementById('ed_target').value=cell.target||'pc2';
  document.getElementById('modal').style.display='flex';
  document.getElementById('ed_index').focus();
}
function closeModal(){document.getElementById('modal').style.display='none';editPos=-1;}
function applyModal(){
  if(editPos<0)return;var cell=cellByPos(editPos);
  cell.index=parseInt(document.getElementById('ed_index').value,10)||0;
  cell.name=document.getElementById('ed_name').value.trim();
  cell.target=document.getElementById('ed_target').value;
  closeModal();setDirty(true);render();st('edited cell '+editPos+' (unsaved)');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
load();
</script>
</body></html>
